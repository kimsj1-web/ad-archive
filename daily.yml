name: 광고 아카이브 자동 업데이트

on:
  schedule:
    # 매일 오전 9시 (KST = UTC+9 → UTC 00:00)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date_start:
        description: "시작일 (YYYY-MM-DD), 비우면 최근 30일"
        required: false
        default: ""
      date_stop:
        description: "종료일 (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  update-archive:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # index.html 커밋을 위해 필요

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 광고 데이터 수집 및 HTML 생성
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          DATE_START: ${{ github.event.inputs.date_start }}
          DATE_STOP: ${{ github.event.inputs.date_stop }}
        run: python fetch_ads.py

      - name: index.html 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: 광고 아카이브 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
          git push
